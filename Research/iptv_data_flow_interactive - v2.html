<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Deep Dive - Luồng dữ liệu chi tiết</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
        }

        /* Animations for data flow */
        @keyframes flow-stream {
            from { stroke-dashoffset: 40; }
            to { stroke-dashoffset: 0; }
        }
        
        @keyframes move-particle {
            0% { offset-distance: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { offset-distance: 100%; opacity: 0; }
        }

        .flow-line {
            stroke-dasharray: 8 8;
            transition: all 0.5s ease;
        }

        .particle {
            r: 5;
            filter: drop-shadow(0 0 4px currentColor);
            opacity: 0;
        }

        .particle-active {
            animation: move-particle 2.5s linear infinite;
        }

        .particle-active-fast {
            animation: move-particle 1.2s linear infinite;
        }

        .node {
            transition: all 0.5s ease-in-out;
        }

        .info-scroll::-webkit-scrollbar { width: 6px; }
        .info-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .info-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center justify-center">

    <div class="max-w-6xl w-full bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700">
        
        <!-- Header -->
        <div class="p-6 border-b border-slate-700 bg-slate-800/50">
            <h2 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent mb-4">
                Phân tích luồng dữ liệu IPTV & PMS
            </h2>
            <div class="flex flex-wrap gap-2" id="btn-container"></div>
        </div>

        <!-- Main Content Area -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-0">
            
            <!-- SVG Diagram -->
            <div class="lg:col-span-2 p-6 bg-slate-900 flex items-center justify-center relative overflow-hidden" style="min-height: 550px;">
                <svg id="main-svg" viewBox="0 0 800 550" class="w-full h-full max-w-full">
                    <defs>
                        <linearGradient id="grad-video" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#2563eb" />
                            <stop offset="100%" stop-color="#3b82f6" />
                        </linearGradient>
                        <linearGradient id="grad-vella" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#10b981" />
                            <stop offset="100%" stop-color="#059669" />
                        </linearGradient>
                    </defs>

                    <!-- Connections -->
                    <!-- Opera to Vella -->
                    <path id="path-opera-vella" d="M 180 380 L 320 380" fill="none" stroke="#f59e0b" stroke-width="2" class="flow-line opacity-20" />
                    <path id="path-vella-opera" d="M 320 400 L 180 400" fill="none" stroke="#f59e0b" stroke-width="2" class="flow-line opacity-20" />

                    <!-- Vella to Switch -->
                    <path id="path-vella-sw" d="M 400 350 L 400 250" fill="none" stroke="#10b981" stroke-width="2" class="flow-line opacity-20" />
                    
                    <!-- Switch to TVs -->
                    <path id="path-sw-tv101" d="M 480 210 C 550 210, 600 100, 650 100" fill="none" stroke="#64748b" stroke-width="2" class="flow-line opacity-20" />
                    <path id="path-sw-tv102" d="M 480 210 L 650 210" fill="none" stroke="#64748b" stroke-width="2" class="flow-line opacity-20" />
                    <path id="path-sw-tv103" d="M 480 210 C 550 210, 600 320, 650 320" fill="none" stroke="#64748b" stroke-width="2" class="flow-line opacity-20" />

                    <!-- Headend to Switch -->
                    <path id="path-headend-sw" d="M 180 100 L 320 210" fill="none" stroke="#3b82f6" stroke-width="3" class="flow-line opacity-20" />

                    <!-- PARTICLES -->
                    <!-- PMS Data (Amber) -->
                    <circle id="p-opera-vella" class="particle text-amber-500" fill="currentColor" style="offset-path: path('M 180 380 L 320 380');" />
                    <circle id="p-vella-opera" class="particle text-amber-500" fill="currentColor" style="offset-path: path('M 320 400 L 180 400');" />
                    
                    <!-- Middleware Control (Emerald) -->
                    <circle id="p-vella-sw-tv1" class="particle text-emerald-400" fill="currentColor" style="offset-path: path('M 400 350 L 400 210 C 500 210, 580 100, 650 100');" />
                    
                    <!-- TV Request (White) -->
                    <circle id="p-tv1-vella" class="particle text-white" fill="currentColor" style="offset-path: path('M 650 110 C 580 110, 500 220, 410 350');" />

                    <!-- Video Streams (Colored) -->
                    <circle id="p-vid-red" class="particle text-red-500" r="7" fill="currentColor" style="offset-path: path('M 180 100 L 320 210 L 480 210 C 550 210, 600 100, 650 100');" />
                    <circle id="p-vid-blue" class="particle text-blue-500" r="7" fill="currentColor" style="offset-path: path('M 180 100 L 320 210 L 480 210 L 650 210');" />
                    <circle id="p-vid-purple" class="particle text-purple-500" r="7" fill="currentColor" style="offset-path: path('M 180 100 L 320 210 L 480 210 C 550 210, 600 320, 650 320');" />

                    <!-- NODES -->
                    <!-- Headend -->
                    <g id="node-headend" class="node" transform="translate(40, 60)">
                        <rect width="140" height="80" rx="12" fill="url(#grad-video)" />
                        <text x="70" y="45" fill="white" font-weight="bold" text-anchor="middle" font-size="14">IPTV Headend</text>
                        <text x="70" y="62" fill="#bfdbfe" font-size="10" text-anchor="middle">Streamer / Coder</text>
                    </g>

                    <!-- Middleware -->
                    <g id="node-vella" class="node" transform="translate(320, 350)">
                        <rect width="160" height="90" rx="12" fill="url(#grad-vella)" />
                        <text x="80" y="40" fill="white" font-weight="bold" text-anchor="middle" font-size="14">Vella Middleware</text>
                        <text x="80" y="60" fill="#a7f3d0" font-size="10" text-anchor="middle">Logic & UI Server</text>
                    </g>

                    <!-- Switch -->
                    <g id="node-switch" class="node" transform="translate(320, 180)">
                        <rect width="160" height="70" rx="12" fill="#334155" />
                        <text x="80" y="42" fill="white" font-weight="bold" text-anchor="middle" font-size="14">L3 Switch</text>
                    </g>

                    <!-- PMS -->
                    <g id="node-opera" class="node" transform="translate(40, 350)">
                        <rect width="140" height="80" rx="12" fill="#78350f" />
                        <text x="70" y="45" fill="white" font-weight="bold" text-anchor="middle" font-size="14">Opera PMS</text>
                        <text x="70" y="62" fill="#fde68a" font-size="10" text-anchor="middle">Database Khách</text>
                    </g>

                    <!-- TV Rooms -->
                    <g transform="translate(650, 70)">
                        <g id="tv-101" class="node">
                            <rect width="110" height="60" rx="6" fill="#0f766e" />
                            <text x="55" y="28" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Room 101</text>
                            <text id="txt-tv1" x="55" y="48" fill="#fca5a5" font-size="10" text-anchor="middle">VTV1 (Kênh Đỏ)</text>
                        </g>
                        <g id="tv-102" class="node" transform="translate(0, 110)">
                            <rect width="110" height="60" rx="6" fill="#0f766e" />
                            <text x="55" y="28" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Room 102</text>
                            <text id="txt-tv2" x="55" y="48" fill="#93c5fd" font-size="10" text-anchor="middle">HBO (Kênh Xanh)</text>
                        </g>
                        <g id="tv-103" class="node" transform="translate(0, 220)">
                            <rect width="110" height="60" rx="6" fill="#0f766e" />
                            <text x="55" y="28" fill="white" font-size="12" font-weight="bold" text-anchor="middle">Room 103</text>
                            <text id="txt-tv3" x="55" y="48" fill="#d8b4fe" font-size="10" text-anchor="middle">CNN (Kênh Tím)</text>
                        </g>
                    </g>
                </svg>
            </div>

            <!-- Description Sidebar -->
            <div class="p-6 bg-slate-800 border-l border-slate-700 flex flex-col h-full">
                <div class="mb-6">
                    <h3 id="step-title" class="text-xl font-bold text-white mb-2">Chọn kịch bản...</h3>
                    <div id="step-badge" class="inline-block px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider mb-4"></div>
                </div>
                <div id="info-content" class="flex-1 overflow-y-auto info-scroll pr-2 space-y-4 text-sm text-slate-300">
                    Chọn một nút phía trên để bắt đầu phân tích luồng.
                </div>
            </div>
        </div>
    </div>

<script>
const steps = [
    {
        title: "Kịch bản Check-in",
        shortTitle: "1. Check-in Flow",
        badge: "PMS ➔ Middleware ➔ TV",
        badgeClass: "bg-amber-500/20 text-amber-500",
        activeNodes: ['node-opera', 'node-vella', 'tv-101'],
        activePaths: ['path-opera-vella', 'path-vella-sw', 'path-sw-tv101'],
        particles: [
            { id: 'p-opera-vella', delay: '0s', class: 'particle-active' }, 
            { id: 'p-vella-sw-tv1', delay: '1s', class: 'particle-active' }
        ],
        tvText: ["Xin chào Mr. An!", "Đang chờ...", "Đang chờ..."],
        html: `
            <div class="space-y-4">
                <div class="p-3 bg-slate-900/50 rounded-lg border-l-4 border-amber-500">
                    <strong class="text-amber-400 block mb-1">Opera PMS gửi gì?</strong>
                    Hạt vàng chứa: Room Number (101), Guest Name (Mr. An), Language (VN), Check-out Date.
                </div>
                <div class="p-3 bg-slate-900/50 rounded-lg border-l-4 border-emerald-500">
                    <strong class="text-emerald-400 block mb-1">Middleware làm gì?</strong>
                    Nhận data, lưu vào DB riêng. Sau đó "bắn" một gói tin UDP/WebSocket tới IP của TV 101 để đánh thức hoặc cập nhật giao diện cá nhân hóa.
                </div>
                <div class="p-3 bg-slate-900/50 rounded-lg border-l-4 border-teal-500">
                    <strong class="text-teal-400 block mb-1">Kết quả trên TV:</strong>
                    TV phòng 101 ngay lập tức hiện lên: <em class="text-white">"Welcome Mr. An to our Hotel"</em> kèm menu bằng tiếng Việt.
                </div>
            </div>
        `
    },
    {
        title: "Kịch bản Đa kênh (Multicast)",
        shortTitle: "2. Multi-Channel",
        badge: "Headend ➔ Switch ➔ TV (Lớp 2)",
        badgeClass: "bg-blue-500/20 text-blue-500",
        activeNodes: ['node-headend', 'node-switch', 'tv-101', 'tv-102', 'tv-103'],
        activePaths: ['path-headend-sw', 'path-sw-tv101', 'path-sw-tv102', 'path-sw-tv103'],
        particles: [
            { id: 'p-vid-red', delay: '0s', class: 'particle-active' },
            { id: 'p-vid-blue', delay: '0.8s', class: 'particle-active' },
            { id: 'p-vid-purple', delay: '1.6s', class: 'particle-active' }
        ],
        tvText: ["VTV1 (Kênh Đỏ)", "HBO (Kênh Xanh)", "CNN (Kênh Tím)"],
        html: `
            <div class="space-y-4">
                <p>Mỗi kênh truyền hình là một hạt màu khác nhau (Luồng Multicast riêng biệt).</p>
                <div class="grid grid-cols-1 gap-2">
                    <div class="flex items-center gap-2"><div class="w-3 h-3 bg-red-500 rounded"></div> <span>Kênh 1: 239.1.1.1 (VTV1)</span></div>
                    <div class="flex items-center gap-2"><div class="w-3 h-3 bg-blue-500 rounded"></div> <span>Kênh 2: 239.1.1.2 (HBO)</span></div>
                    <div class="flex items-center gap-2"><div class="w-3 h-3 bg-purple-500 rounded"></div> <span>Kênh 3: 239.1.1.3 (CNN)</span></div>
                </div>
                <div class="mt-4 p-3 bg-blue-900/20 rounded border border-blue-800/50">
                    <strong>IGMP Snooping:</strong> Switch nhìn thấy TV 101 yêu cầu "Kênh Đỏ", nó sẽ nhân bản hạt đỏ và ném vào cổng 101. Nó tuyệt đối không ném hạt đỏ sang cổng 102 để tiết kiệm tài nguyên.
                </div>
            </div>
        `
    },
    {
        title: "Kịch bản Yêu cầu Dịch vụ",
        shortTitle: "3. Service Request",
        badge: "TV ➔ Middleware ➔ PMS",
        badgeClass: "bg-purple-500/20 text-purple-500",
        activeNodes: ['tv-101', 'node-vella', 'node-opera'],
        activePaths: ['path-sw-tv101', 'path-vella-sw', 'path-vella-opera', 'path-opera-vella'],
        particles: [
            { id: 'p-tv1-vella', delay: '0s', class: 'particle-active-fast' },
            { id: 'p-vella-opera', delay: '1.2s', class: 'particle-active-fast' },
            { id: 'p-p-opera-vella', delay: '2.4s', class: 'particle-active-fast' }
        ],
        tvText: ["Đang đặt In-room Dining", "Sẵn sàng", "Sẵn sàng"],
        html: `
            <div class="space-y-4">
                <div class="p-3 bg-slate-900/50 rounded-lg border-l-4 border-white">
                    <strong class="text-white block mb-1">Bước 1: Khách đặt đồ ăn</strong>
                    Hạt trắng từ TV gửi request HTTP: <em class="text-slate-400">"Phòng 101 đặt 1 Burger"</em> tới Middleware.
                </div>
                <div class="p-3 bg-slate-900/50 rounded-lg border-l-4 border-emerald-500">
                    <strong class="text-emerald-400 block mb-1">Bước 2: Vella xử lý</strong>
                    Vella kiểm tra giá, cộng phí phục vụ, sau đó đẩy hạt vàng sang <strong>Opera PMS</strong> thông qua interface (FIAS hoặc WebService).
                </div>
                <div class="p-3 bg-slate-900/50 rounded-lg border-l-4 border-amber-500">
                    <strong class="text-amber-400 block mb-1">Bước 3: PMS xác nhận</strong>
                    Opera ghi nhận khoản nợ $20 vào hóa đơn phòng 101 và trả về mã xác nhận thành công.
                </div>
            </div>
        `
    }
];

function renderStep(index) {
    const step = steps[index];
    const buttons = document.getElementById('btn-container').children;

    Array.from(buttons).forEach((btn, i) => {
        btn.className = `px-4 py-2 text-xs font-medium rounded-lg transition-all border ${i === index ? 'bg-emerald-600 text-white border-emerald-500 shadow-lg' : 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700'}`;
    });

    document.getElementById('step-title').innerText = step.title;
    document.getElementById('step-badge').innerText = step.badge;
    document.getElementById('step-badge').className = `inline-block px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider mb-4 ${step.badgeClass}`;
    document.getElementById('info-content').innerHTML = step.html;

    // Update TV labels
    document.getElementById('txt-tv1').textContent = step.tvText[0];
    document.getElementById('txt-tv2').textContent = step.tvText[1];
    document.getElementById('txt-tv3').textContent = step.tvText[2];

    // Reset components
    document.querySelectorAll('.node').forEach(n => { n.style.opacity = '0.2'; n.style.filter = 'grayscale(1)'; });
    document.querySelectorAll('.flow-line').forEach(p => p.style.opacity = '0.05');
    document.querySelectorAll('.particle').forEach(p => { p.classList.remove('particle-active', 'particle-active-fast'); p.style.opacity = '0'; });

    // Activate
    step.activeNodes.forEach(id => { 
        const el = document.getElementById(id);
        if(el) { el.style.opacity = '1'; el.style.filter = 'grayscale(0)'; }
    });
    step.activePaths.forEach(id => {
        const el = document.getElementById(id);
        if(el) el.style.opacity = '0.6';
    });
    step.particles.forEach(pData => {
        const p = document.getElementById(pData.id);
        if(p) {
            setTimeout(() => {
                p.classList.add(pData.class);
                p.style.opacity = '1';
            }, parseFloat(pData.delay) * 1000);
        }
    });
}

function init() {
    const container = document.getElementById('btn-container');
    steps.forEach((s, i) => {
        const b = document.createElement('button');
        b.innerText = s.shortTitle;
        b.onclick = () => renderStep(i);
        container.appendChild(b);
    });
    renderStep(1); // Default to Multi-channel
}

init();
</script>
</body>
</html>
