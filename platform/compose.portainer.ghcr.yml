# Stack Portainer: kéo image từ GHCR (không build trên server).
#
# Đổi IP / mật khẩu: sửa TRỰC TIẾP file này (không dùng platform/.env cho stack Portainer).
# Sau khi đổi IP: đặt VITE_API_URL trên GitHub Actions Variables + re-run workflow — xem README.md mục "Chỉnh cho khớp".
#
# ⚠️ FILE NÀY CHỨA MẬT KHẨU MẶC ĐỊNH LAB — repo public → ai cũng thấy.
#    Chỉ để chạy nhanh; đổi POSTGRES_*, SECRET_KEY, FIRST_SUPERUSER_* trước production.
#
# Trước khi deploy: workflow "Build and Push GHCR" đã push image (branch main).
# Đổi IP 192.168.1.116 nếu server bạn khác; redeploy sau khi sửa.
#
# IMAGE_TAG: mặc định latest — có thể override trong Portainer env nếu cần.

version: "3.8"

# Biến dùng chung backend + prestart (trùng DB)
x-vella-backend-env: &vella_backend_env
  DOMAIN: "192.168.1.116"
  FRONTEND_HOST: "http://192.168.1.116:5173"
  ENVIRONMENT: production
  BACKEND_CORS_ORIGINS: "http://192.168.1.116:5173,http://192.168.1.116:8000,http://127.0.0.1:5173"
  SECRET_KEY: "BrEE-rpDW3edm7kIK4zSv90TGie6Ub2_P3S8tGLzjK67ESBiFs4FmCybNPGgTDac"
  FIRST_SUPERUSER: "admin@vella-iptv.local"
  FIRST_SUPERUSER_PASSWORD: "Y1UKVoPaNVtg5vYm9PBTV9so"
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  EMAILS_FROM_EMAIL: "noreply@vella-iptv.local"
  POSTGRES_SERVER: db
  POSTGRES_PORT: "5432"
  POSTGRES_USER: vella
  POSTGRES_DB: vella_iptv
  POSTGRES_PASSWORD: "LZeGmkEZfNzsVOzSKapGF5eJIZ3nwL52"
  SENTRY_DSN: ""

services:
  db:
    image: postgres:18
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      retries: 12
      start_period: 90s
      timeout: 5s
    volumes:
      - vella-iptv-db:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: vella
      POSTGRES_DB: vella_iptv
      POSTGRES_PASSWORD: "LZeGmkEZfNzsVOzSKapGF5eJIZ3nwL52"

  prestart:
    image: ghcr.io/bktrung2003/vella-iptv-backend:${IMAGE_TAG:-latest}
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    command: bash scripts/prestart.sh
    environment:
      <<: *vella_backend_env

  backend:
    image: ghcr.io/bktrung2003/vella-iptv-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      <<: *vella_backend_env
      IPTV_GATEWAY_HLS_BASE_URL: ""
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    image: ghcr.io/bktrung2003/vella-iptv-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  adminer:
    image: adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      ADMINER_DESIGN: pepa-linha-dark

volumes:
  vella-iptv-db:
