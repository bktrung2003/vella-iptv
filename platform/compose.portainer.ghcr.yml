# >>> Dán NGUYÊN file này vào Portainer → Stack → Web editor. KHÔNG sửa compose nếu chưa rành.
# >>> Việc sửa IP / mật khẩu / cổng: làm ở Environment variables — xem PORTAINER-BAN-SUA-GI.txt
#     và copy mẫu từ compose.portainer.ghcr.env.example
#
# Backend ra ngoài mặc định cổng HOST 7000. GitHub Variable VITE_API_URL = http://<IP>:7000

version: "3.8"

x-vella-backend-env: &vella_backend_env
  DOMAIN: ${SERVER_IP}
  FRONTEND_HOST: "http://${SERVER_IP}:${FRONTEND_PUBLISH_PORT:-5173}"
  ENVIRONMENT: production
  PROJECT_NAME: ${PROJECT_NAME:-Vella IPTV}
  BACKEND_CORS_ORIGINS: "http://${SERVER_IP}:${FRONTEND_PUBLISH_PORT:-5173},http://${SERVER_IP}:${BACKEND_PUBLISH_PORT:-7000},http://127.0.0.1:${FRONTEND_PUBLISH_PORT:-5173}"
  SECRET_KEY: ${SECRET_KEY}
  FIRST_SUPERUSER: ${FIRST_SUPERUSER}
  FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-noreply@example.com}
  POSTGRES_SERVER: db
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_USER: ${POSTGRES_USER:-vella}
  POSTGRES_DB: ${POSTGRES_DB:-vella_iptv}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

services:
  db:
    image: postgres:18
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      retries: 12
      start_period: 90s
      timeout: 5s
    volumes:
      - vella-iptv-db:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${POSTGRES_USER:-vella}
      POSTGRES_DB: ${POSTGRES_DB:-vella_iptv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  prestart:
    image: ghcr.io/bktrung2003/vella-iptv-backend:${IMAGE_TAG:-latest}
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    command: bash scripts/prestart.sh
    environment:
      <<: *vella_backend_env

  backend:
    image: ghcr.io/bktrung2003/vella-iptv-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PUBLISH_PORT:-7000}:8000"
    environment:
      <<: *vella_backend_env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    image: ghcr.io/bktrung2003/vella-iptv-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PUBLISH_PORT:-5173}:80"

  adminer:
    image: adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${ADMINER_PUBLISH_PORT:-8080}:8080"
    environment:
      ADMINER_DESIGN: pepa-linha-dark

volumes:
  vella-iptv-db:
